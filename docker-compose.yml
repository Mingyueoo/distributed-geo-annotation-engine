version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geolabeler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: geolabeler
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geolabeler"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: postgresql://geolabeler:${POSTGRES_PASSWORD:-password}@db:5432/geolabeler
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-change-me}
      UPLOAD_FOLDER: /data/uploads
      AI_MODEL_ENDPOINT: ${AI_MODEL_ENDPOINT:-}
      AI_API_KEY: ${AI_API_KEY:-}
    volumes:
      - uploads:/data/uploads
      - ./backend:/app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python /app/scripts/init_db.py && python -m app.main"

  worker:
    build: ./backend
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: postgresql://geolabeler:${POSTGRES_PASSWORD:-password}@db:5432/geolabeler
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      UPLOAD_FOLDER: /data/uploads
    volumes:
      - uploads:/data/uploads
      - ./backend:/app
    depends_on:
      - backend
    command: celery -A worker.celery worker --loglevel=info --concurrency=4

  frontend:
    image: python:3.11-slim
    working_dir: /app
    environment:
      API_BASE_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "pip install flask python-dotenv && python app.py"

volumes:
  pgdata:
  uploads:
